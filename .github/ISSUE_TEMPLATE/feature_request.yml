name: Feature request
description: Idea to improve the Croc GUI desktop experience
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Features for the **desktop wrapper** go here. New croc protocol capabilities usually belong upstream in [schollz/croc](https://github.com/schollz/croc).
        See also [`docs/ROADMAP.md`](https://github.com/interfluve-wav/croc-gui/blob/main/docs/ROADMAP.md).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What is awkward or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should the GUI behave?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Transfer UX
        - Trust / privacy / relays
        - Platform integration
        - Power user
        - Accessibility / i18n
        - Docs / packaging / CI
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
